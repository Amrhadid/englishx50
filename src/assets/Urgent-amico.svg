<svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Urgent countdown illustration">
  <ellipse cx="250" cy="438" rx="170" ry="26" fill="#8B5CF6" opacity="0.12"/>
  <!-- Big alarm clock -->
  <g>
    <circle cx="250" cy="220" r="118" fill="#fff" stroke="#8B5CF6" stroke-width="10"/>
    <circle cx="250" cy="220" r="100" fill="#ECEAFF"/>
    <!-- bells -->
    <path d="M150 130 a40 40 0 0 1 56 -56 z" fill="#EC4899"/>
    <path d="M350 130 a40 40 0 0 0 -56 -56 z" fill="#EC4899"/>
    <rect x="240" y="96" width="20" height="22" rx="6" fill="#8B5CF6"/>
    <!-- hands -->
    <rect x="244" y="148" width="12" height="80" rx="6" fill="#1b1730"/>
    <rect x="248" y="214" width="74" height="12" rx="6" fill="#F59E0B"/>
    <circle cx="250" cy="220" r="12" fill="#8B5CF6"/>
    <!-- ticks -->
    <circle cx="250" cy="138" r="5" fill="#8B5CF6"/>
    <circle cx="332" cy="220" r="5" fill="#8B5CF6"/>
    <circle cx="250" cy="302" r="5" fill="#8B5CF6"/>
    <circle cx="168" cy="220" r="5" fill="#8B5CF6"/>
    <!-- legs -->
    <path d="M178 320 l-26 30" stroke="#1b1730" stroke-width="12" stroke-linecap="round"/>
    <path d="M322 320 l26 30" stroke="#1b1730" stroke-width="12" stroke-linecap="round"/>
  </g>
  <!-- Motion / urgency marks -->
  <path d="M392 196 h44" stroke="#EC4899" stroke-width="9" stroke-linecap="round"/>
  <path d="M392 226 h30" stroke="#F59E0B" stroke-width="9" stroke-linecap="round"/>
  <path d="M64 196 h44" stroke="#EC4899" stroke-width="9" stroke-linecap="round"/>
  <path d="M78 226 h30" stroke="#F59E0B" stroke-width="9" stroke-linecap="round"/>
  <text x="250" y="408" font-family="Arial, sans-serif" font-size="40" font-weight="900" fill="#EC4899" text-anchor="middle">!</text>
</svg>
