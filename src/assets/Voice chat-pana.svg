<svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Voice chat illustration">
  <ellipse cx="250" cy="438" rx="170" ry="26" fill="#8B5CF6" opacity="0.12"/>
  <!-- Left chat bubble -->
  <g>
    <rect x="48" y="150" width="170" height="92" rx="26" fill="#8B5CF6"/>
    <path d="M86 240 l4 26 22 -22 z" fill="#8B5CF6"/>
    <circle cx="92" cy="196" r="9" fill="#fff"/>
    <circle cx="124" cy="196" r="9" fill="#fff" opacity="0.8"/>
    <circle cx="156" cy="196" r="9" fill="#fff" opacity="0.6"/>
  </g>
  <!-- Right chat bubble -->
  <g>
    <rect x="290" y="92" width="160" height="84" rx="24" fill="#EC4899"/>
    <path d="M414 174 l-4 24 -20 -20 z" fill="#EC4899"/>
    <rect x="312" y="120" width="116" height="11" rx="5.5" fill="#fff" opacity="0.9"/>
    <rect x="312" y="142" width="78" height="11" rx="5.5" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Person body -->
  <g>
    <path d="M180 432 v-66 a70 70 0 0 1 140 0 v66 z" fill="#1b1730"/>
    <path d="M214 372 h72 v60 h-72 z" fill="#F59E0B" opacity="0.18"/>
    <!-- head -->
    <circle cx="250" cy="300" r="52" fill="#F7C9A8"/>
    <path d="M198 296 a52 52 0 0 1 104 0 v-12 a52 52 0 0 0 -104 0 z" fill="#1b1730"/>
    <circle cx="232" cy="300" r="5" fill="#1b1730"/>
    <circle cx="270" cy="300" r="5" fill="#1b1730"/>
    <path d="M238 322 q12 10 24 0" stroke="#1b1730" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Microphone -->
  <g>
    <rect x="332" y="276" width="34" height="70" rx="17" fill="#8B5CF6"/>
    <path d="M322 332 a27 27 0 0 0 54 0" stroke="#8B5CF6" stroke-width="7" fill="none" stroke-linecap="round"/>
    <rect x="345" y="358" width="8" height="26" rx="4" fill="#8B5CF6"/>
    <rect x="330" y="384" width="38" height="8" rx="4" fill="#8B5CF6"/>
    <path d="M384 296 q14 14 0 40" stroke="#EC4899" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M398 282 q26 26 0 68" stroke="#EC4899" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>
</svg>
